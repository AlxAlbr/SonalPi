// Variable pour tracker si sauvegarde en cours
let isSaving = false;

// ⭐ Écouter le signal de fermeture depuis le main
window.electronAPI.onSaveAndClose(async () => {
    console.log("📩 Signal 'save-and-close' reçu du main");
    const result = await sauvegarderAvantExit();
    console.log("📤 Envoi du signal 'save-complete' au main");
    await window.electronAPI.saveComplete();
});

// Sauvegarde avant de quitter la page 
async function sauvegarderAvantExit() {
    if (isSaving) {
        console.log("Sauvegarde déjà en cours, abandon");
        return false;
    }

    try {
        isSaving = true;
        console.log("=== SAUVEGARDE DÉMARRÉE ===");
        
        // Vérifier que les éléments existent AVANT de continuer
        const segmentsElem = document.getElementById('segments');
        const notesElem = document.getElementById('txtnotes');
        
        if (!segmentsElem) {
            console.error("Élément 'segments' introuvable !");
            return false;
        }
        if (!notesElem) {
            console.error("Élément 'txtnotes' introuvable !");
            return false;
        }

        //console.log("Segments HTML (premiers 100 chars):", segmentsElem.innerHTML.substring(0, 100));
        //console.log("Notes (premiers 50 chars):", notesElem.value.substring(0, 50));
        
        let rkEnt = await window.electronAPI.getEntCur();
        //console.log("rkEnt trouvé:", rkEnt);
        
        if (rkEnt === null || typeof rkEnt !== 'number') {
            console.error("rkEnt invalide:", rkEnt);
            return false;
        }
        
        // Appel de la fonction de mise à jour (elle lit tabLoc, tabDat, etc. depuis le DOM)
        await window.miseàjourEntretien(rkEnt);
        
        // ⭐ Signal au main process pour mettre à jour le canvas
        await window.electronAPI.updateCanvasAfterSave(rkEnt);
        
        console.log("=== SAUVEGARDE RÉUSSIE ===");
        isSaving = false;
        return true;
    } catch (error) {
        console.error("=== ERREUR LORS DE LA SAUVEGARDE ===:", error);
        isSaving = false;
        return false;
    }
}

// Sauvegarde AVANT destruction du DOM (beforeunload = avant unload)
window.addEventListener('beforeunload', (event) => {
    console.log("beforeunload déclenché");
    sauvegarderAvantExit(); // Lance la sauvegarde sans bloquer
});

// Fallback supplémentaire
window.addEventListener('unload', (event) => {
    console.log("unload déclenché (trop tard probablement)");
});

function SecToTime(time,ssDec){ // conversion de coordonnées en secondes en hh:mm;ss, avec ou sans décimales

    time = Number(time);

    var nbhr = Math.floor(time / 3600);
    var nbmin = Math.floor((time - nbhr*3600)/60);
    var nbsec = Number(time - nbhr*3600 - nbmin * 60);  
    nbsec=nbsec.toFixed(3);

    if(ssDec==true){nbsec = Math.floor(nbsec)}

    nbhr = String(nbhr);
    nbmin = String(nbmin);
    nbsec = String(nbsec);
    
    
    
    

    return nbhr.padStart(2, "0") + ':' + nbmin.padStart(2, '0')  + ':' + nbsec.padStart(2, '0');


};

function TimeToSec(time) { // conversion de données hh:mm:ss en secondes

     
let sspart =  time.split(":");

let pas=0;
let secs = 0;


for (ss=sspart.length-1;ss>-1;ss--) {

     
    let valeur =  sspart[ss]
    valeur = valeur.replace(",",".") // remplacement des virgules par des points

    secs += Number(valeur * Math.pow(60,pas))
    
    pas++;

}

return secs;

}

function posCurs(){ // position du curseur dans la fenêtre de sélection
    
 

 

    const selection = window.getSelection(); 
    const currentNode = selection.focusNode;
    // Si currentNode est un TextNode, utilisez currentNode.parentElement pour obtenir le span
    const mot = currentNode.nodeType === 3 ? currentNode.parentElement : currentNode;
    if (!mot || !mot.dataset.rk) {return false} // pas dans un span
    const segment = mot.parentElement;
    const posCurseurLocale = selection.focusOffset;

    let posCurseurGlobale = 0
    let found = false;

        // Fonction récursive pour parcourir les nœuds
        function traverse(node) {
            if (node === mot) {
            found = true;
            return;
            }
            if (node.nodeType === Node.TEXT_NODE) {
            posCurseurGlobale += node.textContent.length;
            } else if (node.nodeType === Node.ELEMENT_NODE) {
                
            for (let child of node.childNodes) {
                    traverse(child);
                    if (found) return;
            }
            }
        }

        traverse(segment)

        //console.log("dans le segment contenant le texte :", segment.textContent , "\n on est au curseur ", posCurseurGlobale+posCurseurLocale )

        return [mot, segment.textContent, posCurseurLocale, posCurseurGlobale+posCurseurLocale]


}

// showPrompt: non-bloquant, remplacement de window.prompt via <dialog>
function showPrompt(message, defaultValue = "") {
    return new Promise(resolve => {
        const dlg = document.createElement('dialog');
        dlg.className = 'electron-prompt';
        dlg.innerHTML = `
            <form method="dialog" style="display:flex;flex-direction:column;gap:8px;padding:12px;min-width:320px;">
                <label style="font-weight:600;">${message}</label>
                <input id="electron-prompt-input" type="text" value="${String(defaultValue).replace(/"/g,'&quot;')}" style="width:100%;padding:6px;" />
                <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:8px;">
                  <button value="cancel">Annuler</button>
                  <button value="ok">OK</button>
                </div>
            </form>
        `;
        document.body.appendChild(dlg);
        const input = dlg.querySelector('#electron-prompt-input');
        dlg.addEventListener('close', () => {
            const val = input.value;
            const result = dlg.returnValue === 'ok' ? val : null;
            dlg.remove();
            resolve(result);
        }, { once: true });
        dlg.showModal();
        input.focus();
    });
}

function validerCommentaire(rk, rkF){ // validation d'un commentaire existant ou nouveau

    const commentaire = document.getElementById("txtcomms").value;    
    const sign = document.getElementById("authcomm").textContent;

    //if (!commentaire || !sign){return}; 

    if (commentaire.trim() == "") { // SUPPRESSION (si vide)
        //const yes = confirm("Voulez vous supprimer le commentaire ?");
        //if (!yes) { return; }

        supprimerCommentaire(rk, rkF)
        return;
    }

    console.log ("validation d'un commentaire à la position " + rk )
  
     

    try {
        const spn = getSpan(rk);
        if (!spn) {
            console.warn('validerCommentaire: span introuvable pour rk=', rk);
            try { if (typeof hidedlg === 'function') { hidedlg(); } } catch (e) {}
            return;
        }
        spn.classList.add('obs');
        spn.dataset.auth = sign;
        spn.dataset.obs = commentaire;

        if (rkF > 0) {
            spn.dataset.finobs = rkF;
            const spnF = getSpan(rkF);
            if (spnF) { spnF.classList.add('obsfin'); }
        }
    } catch (err) {

    try { if (typeof hidedlg === 'function') { hidedlg(); } } catch (e) {}

 function CopiePressePapier (txtHtml, txtPlain) {

    function listener(e) {
        e.clipboardData.setData("text/html", txtHtml);
        e.clipboardData.setData("text/plain", txtPlain);
        e.preventDefault();
    }

    document.addEventListener("copy", listener);
    document.execCommand('copy');
}

function listenerGraph() {// ajout d'un listener pour le clic sur graph de l'entretien
    
    const cnv = document.getElementById('graphEnt');
    cnv.addEventListener('mouseup', function() {

   
            
            // récupération de la position du canvas
            const  rect= this.getBoundingClientRect();
            // récupération de la position du clic
            const event = window.event; 
            const x = event.clientX - rect.left;
            const width = rect.width;      

            let ratio = x/width; // ratio de la position du clic par rapport à la largeur du canvas
            let nbmots= getNbSpans(); // nombre de mots           
            let pos = Math.round(nbmots * ratio); // position du mot dans le texte

            let mot = getSpan(pos); // récupération du mot à la position
            if (!mot) {return} // si le mot n'existe pas, on sort de la fonction
        
            mot.scrollIntoView({ behavior: 'smooth', block: 'center' });

                
            
 
        });
}

 const searchInput = document.getElementById('searchInput');
 searchInput.addEventListener('keyup', function() {
        const query = this.value.toLowerCase();
        const cats = document.querySelectorAll('.ligthm');
    
        cats.forEach(cat => {       
            cat.classList.remove('dnone');
            cat.innerHTML = cat.innerHTML.replace(/<mark>|<\/mark>/g, '')

            if (query == '') {
                return;
            }

            const text = cat.innerHTML.toLowerCase();
            const title = cat.title.toLowerCase();


            if ((text.includes(query) || title.includes(query)) && query !== '') {
                cat.classList.remove('dnone');

                if (text.includes(query)) {// surlignement (si dans texte et pas dans title)
                    let txtInterne = cat.innerHTML.replace(/<\/a>|<a>/g, '') ;
                    cat.innerHTML = '<a>' + highlightText(txtInterne, query) + '</a>'; 
                }

            } else {
                cat.classList.add('dnone');
                cat.innerHTML = cat.innerHTML.replace(/<mark>|<\/mark>/g, '')   ; // réinitialiser le contenu
            }
        });
    });
 

 // Fonction pour échapper les caractères spéciaux regex
        function escapeRegex(string) {
            return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        }

        // Fonction pour mettre en surbrillance le texte recherché
        function highlightText(text, search) {
            if (!search) return text;
            const regex = new RegExp(`(${escapeRegex(search)})`, 'gi');
            return text.replace(regex, '<mark>$1</mark>');
        }
