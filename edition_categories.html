        // listener sur le scroll pour déplacer l'élément form-cat avec le scroll
        let scrollableDiv = document.querySelector('div[style*="overflow-y: auto"]');
        scrollableDiv.addEventListener('scroll', (event) => {
          let catForm = document.getElementById('cat-form');

        });

function adjustRang(increment){

    // Sélection des éléments nécessaires
 
    const lblrang = document.getElementById("lblrang");
    let rang = Number(lblrang.innerText)

    // Calcule la nouvelle taille (minimum 10px, maximum 48px)
    const newRank = Math.max(0, Math.min(6, rang + increment));

 

    // Met à jour l'affichage
    lblrang.textContent = newRank ;

}

// Fonction pour ajuster la taille de police
function adjustFontSize(increment) {
     
 
    // Sélection des éléments nécessaires
     
    const currentFontSizeDisplay = document.querySelector('.lblTaillePol');


  // Calcule la nouvelle taille (minimum 10px, maximum 48px)
  const newSize = Math.max(10, Math.min(48, taille_cur + increment));

  // Applique la nouvelle taille
  currentFontSizeDisplay.style.fontSize = newSize;

  // Met à jour l'affichage
  currentFontSizeDisplay.textContent = newSize;

   
  if (taille_cur != newSize) {
    taille_cur = newSize
    document.getElementById("chkcatpol").checked=true ;
  } else {
    document.getElementById("chkcatpol").checked=false;

  }
  

  
  
   
}

 

        function annulChgThm(){
          let catForm  = document.getElementById('cat-form');
          catForm.classList.add('dnone');
          affichListThmEdit();
        }


        
        // drag and drop functions
        //const dragEl = document.getElementById('dragElement');
        
        let isDragging = false;
        let currentX;
        let currentY;
        let initialX;
        let initialY;
        let xOffset = 0;
        let yOffset = 0;

        
        document.addEventListener('mousemove', drag);
        document.addEventListener('mouseup', dragEnd);

        // Support tactile
        //dragEl.addEventListener('touchstart', dragStart);
        document.addEventListener('touchmove', drag);
        document.addEventListener('touchend', dragEnd);

        function dragStart(e) {
            if (e.type === 'touchstart') {
                initialX = e.touches[0].clientX - xOffset;
                initialY = e.touches[0].clientY - yOffset;
            } else {
                initialX = e.clientX - xOffset;
                initialY = e.clientY - yOffset;
            }

            //if (e.target === dragEl) {
                isDragging = true;
                dragEl.classList.add('dragging');
            //}
        }

        function drag(e) {
            if (isDragging) {
                e.preventDefault();
                
                if (e.type === 'touchmove') {
                    currentX = e.touches[0].clientX - initialX;
                    currentY = e.touches[0].clientY - initialY;
                } else {
                    currentX = e.clientX - initialX;
                    currentY = e.clientY - initialY;
                }

                xOffset = currentX;
                yOffset = currentY;

                setTranslate(currentX, currentY, dragEl);
            }
        }

        function dragEnd() {
            isDragging = false;
            //dragEl.classList.remove('dragging');

          //  alert("fin du drag");
        }

        function setTranslate(xPos, yPos, el) {
            el.style.transform = `translate(${xPos}px, ${yPos}px)`;
        }
