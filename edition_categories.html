  <script>
    var taille_cur = 18;

    document.addEventListener('DOMContentLoaded', () => {
      affichListThmEdit();
      loadThm();
    });

    document.getElementById('cat-form').addEventListener('submit', e => e.preventDefault());

    /** Ferme l'éditeur ET reconstruit la liste. */
    function annulChgThm() {
      // Retirer le formulaire vers le dock et nettoyer ses styles
      const form = document.getElementById('cat-form');
      const dock = document.getElementById('cat-form-dock');
      if (form && dock && form.parentNode !== dock) {
        form.style.position = '';
        form.style.top = '';
        form.style.left = '';
        form.style.width = '';
        form.style.height = '';
        form.style.zIndex = '';
        form.style.background = '';
        dock.appendChild(form);
      }
      affichListThmEdit();
    }

    function adjustRang(increment) {
      const lblrang = document.getElementById('lblrang');
      lblrang.textContent = Math.max(0, Math.min(6, Number(lblrang.innerText) + increment));
    }

    function adjustFontSize(increment) {
      const display = document.querySelector('.lblTaillePol');
      const newSize = Math.max(10, Math.min(48, taille_cur + increment));
      display.style.fontSize = newSize + 'px';
      display.textContent = newSize;
      if (taille_cur !== newSize) {
        taille_cur = newSize;
        document.getElementById('chkcatpol').checked = true;
      } else {
        document.getElementById('chkcatpol').checked = false;
      }
    }


    function hidedlg(){
    let element = document.getElementById('dlg');
    element.style.display = "none";
   
}
