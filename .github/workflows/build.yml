name: Build Electron App
on:
  push:
    tags:
      - 'v*.*.*'
permissions:
  contents: write  # Required for creating releases and uploading assets
  id-token: write  # Required for authentication with cloud providers

jobs:
  build:
    runs-on: ${{ matrix.os }}
    
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-15]
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Cache electron-builder
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/electron-builder
            ~/Library/Caches/electron-builder
            ~\AppData\Local\electron-builder
          key: electron-builder-${{ matrix.os }}-${{ hashFiles('**/package-lock.json') }}
      
      - name: Install dependencies
        run: npm ci

      - name: Clear electron-builder cache (Linux/macOS)
        if: runner.os != 'Windows'
        run: rm -rf ~/.cache/electron-builder/appimage
      
      - name: Clear electron-builder cache (Windows)
        if: runner.os == 'Windows'
        run: Remove-Item -Path "$env:LOCALAPPDATA\electron-builder\appimage" -Recurse -Force -ErrorAction SilentlyContinue

      - name: Install snapcraft
        if: matrix.os == 'ubuntu-latest'
        run: sudo snap install snapcraft --classic
      
      - name: Build application
        run: npm run build -- --publish always
        env:
          GH_TOKEN: ${{ github.token }}
          ELECTRON_BUILDER_CONCURRENT_DOWNLOADS: 1
          ELECTRON_BUILDER_MAX_RETRIES: 3
      
      - name: List generated files (Linux)
        if: runner.os == 'Linux'
        run: ls -la dist/
      
      - name: List generated files (macOS)
        if: runner.os == 'macOS'
        run: ls -la dist/
      
      - name: List generated files (Windows)
        if: runner.os == 'Windows'
        run: Get-ChildItem -Path "dist\" -Recurse

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sonal-${{ matrix.os }}
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.AppImage
            dist/*.deb
            dist/*.snap
          retention-days: 3
