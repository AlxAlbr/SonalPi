  // ==============================================
  // REDIMENSIONNEMENT COLONNE GAUCHE
  // ==============================================

  // Sélectionner le conteneur et la ligne de redimensionnement
  const colonneG =  document.getElementById('colonne-gauche');
  const resizerCol = document.getElementById('ColResize');

  // Déclarer une variable pour suivre la position de la souris
  let isResizingC = false;
  let lastX = 0;

  resizerCol.addEventListener('mousedown', (e) => {
    // Démarre le redimensionnement
    isResizingC = true;
    lastX = e.clientX;
    document.body.style.cursor = 'ew-resize';  
  

  });

  document.addEventListener('mousemove', (e) => {
    if (isResizingC) {

      
      // Calculer la nouvelle largeur du conteneur en fonction du mouvement de la souris
      const deltaX = e.clientX - lastX;
      const newWidth = colonneG.offsetWidth + deltaX;

      
      
      // Appliquer la nouvelle largeur
      colonneG.style.width = `${newWidth}px`;
      resizerCol.style.left = `${newWidth}px`;

      // déplacer colonne droite

      let colDroite = document.getElementById('fond_ent_corpus');
      let newWidth2 = colDroite.offsetWidth - deltaX;
      let newLeft = colDroite.offsetLeft + deltaX;
      //colDroite.style.marginLeft  = `${newLeft}px`;
      colDroite.style.width = `${newWidth2}px`;


      // Mettre à jour la position de la souris pour le prochain calcul
      lastX = e.clientX;
    }
  });

  document.addEventListener('mouseup', () => {
    // Arrête le redimensionnement quand on relâche le bouton de la souris
    isResizingC = false;
    document.body.style.cursor = 'default'; // Rétablir le curseur par défaut
  });


// =============================================
// DRAG DROP de fichiers

        const fondEnts =  document.getElementById('fond_ent_corpus');

        fondEnts.addEventListener('drop', (e) => {
            e.preventDefault();
            e.stopPropagation();
            fondEnts.classList.remove('drag-over');

            const files = Array.from(e.dataTransfer.files);
    
             
            if (files.length > 0) {
                selectedTextFiles = window.electronAPI.getFilePaths(files);
                console.log('Fichiers déposés :', selectedTextFiles);

                // Appeler la fonction pour ajouter les entretiens
                ajouterPlusieursEntretiens(selectedTextFiles);

  // ==============================================

 //=============================================      
  //listener sur le bouton activeAllCat 
  //=============================================

        let activeAllCat = document.getElementById("activeAllCat")
        activeAllCat.addEventListener('mousedown', async (event)=>  {
         nbActive=0; 

          // définition de la situation 
          tabThm.forEach(t => {
            if (t.act === true ){
              nbActive++;
            }
          });          

          if (nbActive === tabThm.length){
            // tout est actif, on désactive tout
            tabThm.forEach(t => {
              t.act = false;
            });
      
          } else {

            tabThm.forEach(t => {
              t.act = true;

            });

            // retrait de la condition & (impossible à réaliser avec tous les thèmes en simultané)
              if (selCatCritereEt){
                selCatCritereEt = false;
                document.getElementById("selCatEt").classList.remove('btn-bleu-actif');
              }
          
          }

          await window.electronAPI.setThm(tabThm)

          affichListThmCrp();
          compterCatActifs();
          // redessin de tous les graphs 
          //dessinTousEntretiens();
          affichageExtraitsCorpus(selCatCritereEt);
          

        }); 

  //=============================================      
  // listener sur le bouton activeAllEnt
  //=============================================

        let activeAllEnt = document.getElementById("activeAllEnt");
        activeAllEnt.addEventListener('mousedown', async (event) => {
            let tabEnt = await window.electronAPI.getEnt();
            let nbActifs = tabEnt.filter(e => e.actif !== 0).length;
            let toutActif = (nbActifs === tabEnt.length);

            tabEnt.forEach(e => { e.actif = toutActif ? 0 : 1; });
            await window.electronAPI.setEnt(tabEnt);
           

            // mise à jour du DOM
            document.querySelectorAll('div.ligent').forEach(ligentDiv => {
                const id = Number(ligentDiv.dataset.id);
                const ent = tabEnt.find(e => e.id === id);
                if (!ent) return;
                const btn = ligentDiv.querySelector('.btn-onoff-ent');
                if (ent.actif === 0) {
                    ligentDiv.classList.add('ligent--inactif');
                    if (btn) btn.classList.remove('btn-onoff-ent--actif');
                } else {
                    ligentDiv.classList.remove('ligent--inactif');
                    if (btn) btn.classList.add('btn-onoff-ent--actif');
                }
            });

            compterEntActifs();
        });


  //=============================================

  //===================================================

  //===================================================

             affichListThmCrp(data)

  //=============================================      
  // Écouter le signal de rafraîchissement du canvas
  //=============================================
  
  window.electronAPI.onRefreshCanvas((rkEnt) => {
    console.log("📊 Signal de rafraîchissement reçu pour l'entretien:", rkEnt);
    
    // Récupérer le HTML sauvegardé
    window.electronAPI.getHtml(rkEnt).then((html) => {
      if (!html) {
        console.error("HTML non trouvé pour l'entretien:", rkEnt);
        return;
      }
      
      // Récupérer l'entretien pour trouver son ID
      window.electronAPI.getEnt().then((tabEnt) => {
        if (!tabEnt || !tabEnt[rkEnt]) {
          console.error("Entretien non trouvé au rang:", rkEnt);
          return;
        }
        
        const ent = tabEnt[rkEnt];
        
        // Trouver le canvas correspondant
        const cnvEnt = document.querySelector(`canvas.cnvent[data-id='${ent.id}']`);
        if (cnvEnt) {
           
          resumeGraphique(html.replace(/`/g,'')).then((tabGrphEnt) => {
            dessinResumeGraphique(rkEnt, cnvEnt, tabGrphEnt);
          }).catch(err => console.error("Erreur resumeGraphique:", err));
           
        } else {
          console.error("Canvas introuvable pour l'entretien id:", ent.id);
        }
      }).catch(err => console.error("Erreur getEnt:", err));
    }).catch(err => console.error("Erreur getHtml:", err));
  });
 




// veille des verrous sur les entertiens
setInterval(async () => {
    

    // veille tous les 30 secondes
    console.log("Vérification des verrous sur les entretiens...");

    // récupération des infos du corpus
   let Corpus = await window.electronAPI.getCorpus();

   if (!Corpus || Corpus.type !='distant') {return}

    // récupération des entretiens
    let tabEnt = await window.electronAPI.getEnt();


        for (let i=0; i<tabEnt.length; i++){
        const btn = document.querySelector(`button[data-id="${tabEnt[i].id}"]`);
        let result = await window.electronAPI.isEntretienLocked(i);

            if (result && result.locked == true){ 

                // entretien verrouillé par un autre utilisateur
                console.log("L'entretien " + tabEnt[i].nom + " est verrouillé par " + result.user);
                btn.classList.add("btn-verrou");
                btn.classList.remove("btn-edit");

            } else {

                // entretien non verrouillé
                btn.classList.remove("btn-verrou");
                btn.classList.add("btn-edit");
        }
    }

    console.log("Vérification des verrous terminée.");

}, 30000);

async function displayRecentFiles() {

        <span class="file-date">${new Date(file.openedAt).toLocaleDateString()}</span>
      
      <!-- <div onclick="removeRecentFile('${file.path}')" title="Retirer" class="btn-recent-file">✕</div> !-->

  `).join('');


     await window.recentFiles.updateMenu();
 
// recherche dans les thm
 const searchInput = document.getElementById('searchInput');
 searchInput.addEventListener('keyup', function() {
        const query = this.value.toLowerCase();
        const cats = document.querySelectorAll('.ligthm');
    
        cats.forEach(cat => {       
            cat.classList.remove('dnone');
            cat.innerHTML = cat.innerHTML.replace(/<mark>|<\/mark>/g, '')

            if (query == '') {
                return;
            }

            const text = cat.innerHTML.toLowerCase();
            const title = cat.title.toLowerCase();


            if ((text.includes(query) || title.includes(query)) && query !== '') {
                cat.classList.remove('dnone');

                if (text.includes(query)) {// surlignement (si dans texte et pas dans title)
                    let txtInterne = cat.innerHTML.replace(/<\/a>|<a>/g, '') ;
                    cat.innerHTML = '<a>' + highlightText(txtInterne, query) + '</a>'; 
                }

            } else {
                cat.classList.add('dnone');
                cat.innerHTML = cat.innerHTML.replace(/<mark>|<\/mark>/g, '')   ; // réinitialiser le contenu
            }
        });
    });
 

 // Fonction pour échapper les caractères spéciaux regex
        function escapeRegex(string) {
            return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        }

        // Fonction pour mettre en surbrillance le texte recherché
        function highlightText(text, search) {
            if (!search) return text;
            const regex = new RegExp(`(${escapeRegex(search)})`, 'gi');
            return text.replace(regex, '<mark>$1</mark>');
        }





    // Attacher les event listeners APRÈS avoir créé le HTML
  document.querySelectorAll('.file-info').forEach((el, index) => {

      if (file.type === 'gitlab') {
        // Ouvrir corpus GitLab avec la config pré-remplie

        if (result && result.success) {

      } else if (file.type === 'remote') {
        // Ouvrir corpus distant avec l'URL pré-remplie
        const result = await window.electronAPI.invoke('ouvrir-corpus-distant-avec-retry', file.path);
        if (result && result.success) {
          window.electronAPI.onAfficherCorpus((corpus) => {});
        }
      } else {
        // Ouvrir corpus local
        window.electronAPI.ouvrirCorpusLocal(file.path);
      }
    });
  });

  document.querySelectorAll('.btn-remove').forEach((btn, index) => {
    btn.addEventListener('click', async () => {
      await removeRecentFile(recentFiles[index].path);

  });

      console.log("Compactage de toutes les thématiques");
    }

    await window.electronAPI.setThm(tabThm);

    return; 

    // réaffichage des thématiques
    lignesThm = document.querySelectorAll('.ligthm');
    lignesThm.forEach(lig => {
      
        const rkThm = parseInt(lig.getAttribute('data-rkthm'));
        const thm = tabThm[rkThm];

        if (thm.cmpct === true) {
          
          if (tabThm[rkThm].rang>0) {
            lig.classList.add('ligthm-cmpct');
          }else {
            lig.classList.add('ligfam');
            lig.classList.remove('ligfam-cmpct');
          }

        } else {
            if (tabThm[rkThm].rang>0) {
            lig.classList.remove('ligthm-cmpct');
            } else {
            lig.classList.add('ligthm-cmpct');
            lig.classList.remove('ligfam');
            }
            
        }

    });
  
    });







</script>
 

</html>
